<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FABRIC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* SECTION */
.card-section{
    padding:40px 20px;
    background:#f5f5f5;
}

/* GRID */
.card-grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

/* SAME SIZE IMAGE */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* TEXT */
.card p{
    padding:12px;
    font-size:16px;
    font-weight:600;
}

</head>

<body>

<header>
    <div class="logo">FABRIC</div>
    <nav>
        <a href="#">Categories</a>
        <a href="#">New Arrivals</a>
        <a href="#">Deals</a>
    </nav>
    <div class="icons">🔍 🤍 🛒 Login</div>
</header>

<!-- SECTION 1 -->
<section class="hero">
<div class="grid">
    <div class="box">
        <img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
    </div>

    <div class="box sale">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
        <div class="sale-content">
            <h1>SALE</h1>
            <h2>SAVE BIG!</h2>
            <button>Shop Now</button>
        </div>
    </div>

    <div class="box">
        <img src=".vscode\retro.jpg">
    </div>
    <div class="box">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
    </div>
    <div class="box">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
    </div>
</div>
</section>

<!-- SECTION 2 -->
<section class="deals">

    <p>Trending fashion at best prices</p><br>
    <div class="timer">
        <div><span>03</span>Hours</div>
        <div><span>26</span>Minutes</div>
        <div><span>59</span>Seconds</div><br>
        <button><</button>
        <button>></button><br>

    </div>
</div>

<div class="deals-right">
    <img src="https://images.unsplash.com/photo-1515372039744-b8f02a3ae446" class="main">
    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9" class="back1">
    <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb" class="back2">
</div>
</section>

<!-- SECTION 3 -->

<div class="cards">
    <div class="card">

            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
            <div class="rating">4.6 ⭐</div>
            <div class="wishlist">♡</div>
        </div>
        <h4>Black Dress</h4>
        <p>Women Fashion</p>
    </div>

    <div class="card">
        <div class="card-top">
            <img src="https://images.unsplash.com/photo-1485462537746-965f33f7f6a7">
            <div class="rating">4.7 ⭐</div>
            <div class="wishlist">♡</div>
        </div>
        <h4>Casual Wear</h4>
        <p>Daily Style</p>
    </div>

    <div class="card">
        <div class="card-top">
            <img src="https://images.unsplash.com/photo-1519744792095-2f2205e87b6f">
            <div class="rating">4.5 ⭐</div>
            <div class="wishlist">♡</div>
        </div>
        <h4>Summer Outfit</h4>
        <p>Trending</p>
    </div>

    <div class="card">
        <div class="card-top">
            <img src="https://images.unsplash.com/photo-1518893494013-481c1d8ed3fd">
            <div class="rating">4.8 ⭐</div>
            <div class="wishlist">♡</div>
        </div>
        <h4>Luxury Dress</h4>
        <p>Premium</p>
    </div>
</div>

</html>
