<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Shop</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* ===== TOP BAR ===== */
.top-bar{
    display:flex;
    justify-content:space-between;
    padding:8px 40px;
    background:#222;
    color:white;
    font-size:14px;
}

.top-icons i{
    margin-left:15px;
    cursor:pointer;
}

/* ===== HEADER ===== */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#ff7a7a;
}

.search input{
    padding:8px 15px;
    width:280px;
    border:1px solid #ccc;
    border-radius:20px;
}

/* ===== NAVBAR ===== */
nav{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:15px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#333;
    font-weight:600;
}

nav a:hover{
    color:#ff7a7a;
}

/* ===== HERO ===== */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px;
    background:#f9f4f2;
    gap:30px;
}

.hero-text{
    width:50%;
}

.hero-text span{
    color:#ff7a7a;
    font-size:18px;
}

.hero-text h1{
    font-size:42px;
    margin:15px 0;
}

.hero-text p{
    font-size:18px;
    margin-bottom:20px;
}

.hero-text button{
    padding:12px 30px;
    background:#ff7a7a;
    border:none;
    color:white;
    font-size:16px;
    border-radius:25px;
    cursor:pointer;
}

.hero-img{
    width:45%;
}

.hero-img img{
    width:100%;
    border-radius:20px;
}

/* ===== PRODUCTS ===== */
.products{
    padding:60px 40px;
}

.products h2{
    text-align:center;
    margin-bottom:40px;
    font-size:32px;
}

.product-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:30px;
}

.card{
    border:1px solid #eee;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 5px;
}

.card p{
    color:#ff7a7a;
    font-weight:bold;
}

.card button{
    margin:15px 0 25px;
    padding:10px 25px;
    background:#ff7a7a;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .hero{
        flex-direction:column;
        padding:30px;
    }
    .hero-text, .hero-img{
        width:100%;
        text-align:center;
    }
    .search input{
        width:180px;
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div>Free Shipping on Orders Over $50</div>
    <div class="top-icons">
        <i class="fa fa-user"></i>
        <i class="fa fa-heart"></i>
        <i class="fa fa-shopping-cart"></i>
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="logo">Fashion</div>
    <div class="search">
        <input type="text" placeholder="Search products...">
    </div>
</header>

<!-- NAV -->
<nav>
    <a href="#">HOME</a>
    <a href="#">CATEGORIES</a>
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">JEWELRY</a>
    <a href="#">PERFUME</a>
    <a href="#">BLOG</a>
    <a href="#">OFFERS</a>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <span>Trending Item</span>
        <h1>WOMEN'S LATEST<br>FASHION SALE</h1>
        <p>Starting at $20.00</p>
        <button>SHOP NOW</button>
    </div>

    <div class="hero-img">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
            <h3>Stylish Dress</h3>
            <p>$35.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
            <h3>Men Jacket</h3>
            <p>$49.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
            <h3>Jewelry Set</h3>
            <p>$25.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585386959984-a4155222cbb0">
            <h3>Perfume</h3>
            <p>$30.00</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

</body>
</html>
