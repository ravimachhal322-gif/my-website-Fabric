<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Style Website</title>
  <link rel="stylesheet" href="babbu.css">
</head>
<body>

  <!-- HEADER -->
  <header class="navbar">
    <div class="logo">FigmaStyle</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Clean & Simple Design</h1>
    <p>Minimalist layout with hover effects and modern look</p>
    <button>Get Started</button>
  </section>

  <!-- PROJECT CARDS -->
  <section class="projects">
    <div class="project-card">
      <img src="https://via.placeholder.com/300x200" alt="Project 1">
      <h3>Project 1</h3>
      <p>UI/UX Design</p>
      <button>View</button>
    </div>
    <div class="project-card">
      <img src="https://via.placeholder.com/300x200" alt="Project 2">
      <h3>Project 2</h3>
      <p>Web Design</p>
      <button>View</button>
    </div>
    <div class="project-card">
      <img src="https://via.placeholder.com/300x200" alt="Project 3">
      <h3>Project 3</h3>
      <p>App Design</p>
      <button>View</button>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 FigmaStyle | All Rights Reserved</p>
  </footer>

</body>
</html>
